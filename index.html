<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나는 어떤 주식 투자자? 💰</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

  :root {
    --pink:    #ff6b9d;
    --purple:  #a78bfa;
    --blue:    #60a5fa;
    --green:   #34d399;
    --yellow:  #fbbf24;
    --orange:  #fb923c;
    --bg:      #fdf4ff;
    --card:    #ffffff;
    --text:    #1e1b4b;
    --sub:     #6b7280;
    --border:  #f3e8ff;
    --shadow:  0 4px 24px rgba(167,139,250,0.13);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
  }

  /* ── 공통 카드 ── */
  .card {
    background: var(--card);
    border-radius: 28px;
    padding: 40px 36px;
    max-width: 560px;
    width: 100%;
    box-shadow: var(--shadow);
    border: 1.5px solid var(--border);
    animation: fadeUp 0.4s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── 인트로 화면 ── */
  .intro-emoji {
    font-size: 64px;
    text-align: center;
    margin-bottom: 16px;
    animation: bounce 1.6s infinite;
  }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-8px); }
  }

  .intro-title {
    font-size: 26px;
    font-weight: 900;
    text-align: center;
    line-height: 1.35;
    margin-bottom: 10px;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .intro-sub {
    text-align: center;
    color: var(--sub);
    font-size: 14px;
    line-height: 1.7;
    margin-bottom: 28px;
  }

  .tag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 32px;
  }
  .tag {
    background: #f3e8ff;
    color: var(--purple);
    font-size: 12px;
    font-weight: 700;
    padding: 5px 13px;
    border-radius: 20px;
    letter-spacing: 0.3px;
  }

  /* ── 버튼 ── */
  .btn-primary {
    display: block;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 0.3px;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(167,139,250,0.35);
  }
  .btn-primary:active { transform: translateY(0); }

  /* ── 진행 바 ── */
  .progress-wrap {
    max-width: 560px;
    width: 100%;
    margin-bottom: 16px;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 600;
    color: var(--purple);
    margin-bottom: 7px;
  }
  .progress-bar-bg {
    height: 8px;
    background: #ede9fe;
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--pink), var(--purple));
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  /* ── 질문 화면 ── */
  .q-label {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    color: #fff;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 14px;
    letter-spacing: 0.5px;
  }
  .q-emoji {
    font-size: 40px;
    margin-bottom: 10px;
    display: block;
    text-align: center;
  }
  .q-text {
    font-size: 19px;
    font-weight: 800;
    line-height: 1.45;
    text-align: center;
    margin-bottom: 28px;
  }

  .options { display: flex; flex-direction: column; gap: 12px; }

  .option-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 18px;
    background: #faf5ff;
    border: 2px solid #ede9fe;
    border-radius: 16px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    text-align: left;
    transition: all 0.18s;
    line-height: 1.5;
  }
  .option-btn:hover {
    border-color: var(--purple);
    background: #f3e8ff;
    transform: translateX(4px);
  }
  .option-btn:active { transform: translateX(2px); }
  .option-btn.selected {
    border-color: var(--pink);
    background: linear-gradient(135deg, #ffe4f0, #f3e8ff);
    box-shadow: 0 2px 12px rgba(255,107,157,0.15);
  }
  .opt-icon {
    font-size: 22px;
    flex-shrink: 0;
    width: 32px;
    text-align: center;
  }

  /* ── 로딩 화면 ── */
  .loading-wrap {
    text-align: center;
    padding: 20px 0;
  }
  .loading-spinner {
    display: inline-block;
    width: 56px;
    height: 56px;
    border: 5px solid #ede9fe;
    border-top-color: var(--purple);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-size: 15px;
    color: var(--purple);
    font-weight: 600;
  }
  .loading-sub { font-size: 13px; color: var(--sub); margin-top: 6px; }

  /* ── 결과 화면 ── */
  .result-badge {
    text-align: center;
    margin-bottom: 8px;
  }
  .result-badge span {
    font-size: 11px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    color: #fff;
    padding: 5px 16px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }
  .result-emoji { font-size: 72px; text-align: center; margin: 12px 0 6px; }
  .result-type {
    font-size: 13px;
    font-weight: 700;
    color: var(--purple);
    text-align: center;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }
  .result-title {
    font-size: 24px;
    font-weight: 900;
    text-align: center;
    line-height: 1.3;
    margin-bottom: 10px;
  }
  .result-ticker {
    display: flex;
    justify-content: center;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .ticker-chip {
    font-size: 12px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1.5px solid;
  }

  .result-desc {
    font-size: 14px;
    line-height: 1.8;
    color: #374151;
    background: #faf5ff;
    border-radius: 16px;
    padding: 18px 20px;
    margin-bottom: 20px;
    border-left: 4px solid var(--purple);
  }

  .result-reason-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--sub);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .reason-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .reason-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 13px;
    color: #374151;
    line-height: 1.6;
  }
  .reason-item::before {
    content: '✅';
    flex-shrink: 0;
    font-size: 14px;
    margin-top: 1px;
  }

  .score-bar-section { margin: 20px 0; }
  .score-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 600;
    color: var(--sub);
    margin-bottom: 5px;
  }
  .score-bar-bg {
    height: 10px;
    background: #f3f4f6;
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .score-bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 1s ease 0.3s;
  }

  .share-row {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }
  .btn-retry {
    flex: 1;
    padding: 14px;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 700;
    border: 2px solid var(--purple);
    background: transparent;
    color: var(--purple);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-retry:hover { background: #f3e8ff; }

  .btn-share {
    flex: 1;
    padding: 14px;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 700;
    border: none;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    color: #fff;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-share:hover { opacity: 0.88; transform: translateY(-1px); }

  .divider {
    height: 1px;
    background: #ede9fe;
    margin: 20px 0;
  }

  .hidden { display: none; }

  /* ── 반응형 ── */
  @media (max-width: 480px) {
    .card { padding: 28px 20px; }
    .intro-title { font-size: 22px; }
    .q-text { font-size: 17px; }
    .result-title { font-size: 21px; }
  }
</style>
</head>
<body>

<!-- ══════════════════════════════
     화면 1: 인트로
══════════════════════════════ -->
<div id="screen-intro" class="card">
  <div class="intro-emoji">📈</div>
  <h1 class="intro-title">나는 어떤 주식 투자자?<br>나만의 종목 찾기 🔍</h1>
  <p class="intro-sub">
    9가지 질문으로 당신의 투자 성향을 분석하고<br>
    딱 맞는 주식 유형을 추천해드립니다 💡<br>
    솔직하게 답할수록 더 정확해요!
  </p>
  <div class="tag-row">
    <span class="tag">⏱ 소요 2분</span>
    <span class="tag">❓ 9문항</span>
    <span class="tag">📊 5가지 유형</span>
    <span class="tag">무료</span>
  </div>
  <button class="btn-primary" onclick="startTest()">테스트 시작하기 →</button>
</div>

<!-- ══════════════════════════════
     화면 2: 진행 바 + 질문
══════════════════════════════ -->
<div id="screen-question" class="hidden" style="max-width:560px; width:100%;">
  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="q-step">1 / 6</span>
      <span id="q-pct">17%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill" style="width:17%"></div>
    </div>
  </div>

  <div class="card">
    <div style="text-align:center">
      <span class="q-label" id="q-label">Q1</span>
    </div>
    <span class="q-emoji" id="q-emoji">🤔</span>
    <p class="q-text" id="q-text">질문이 여기 들어갑니다</p>
    <div class="options" id="options-wrap"></div>
  </div>
</div>

<!-- ══════════════════════════════
     화면 3: 로딩
══════════════════════════════ -->
<div id="screen-loading" class="card hidden">
  <div class="loading-wrap">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loading-msg">당신의 투자 성향 분석 중...</div>
    <div class="loading-sub">잠시만 기다려주세요 🔍</div>
  </div>
</div>

<!-- ══════════════════════════════
     화면 4: 결과
══════════════════════════════ -->
<div id="screen-result" class="card hidden">
  <div class="result-badge"><span>🎉 분석 완료</span></div>
  <div class="result-emoji" id="r-emoji">📦</div>
  <div class="result-type" id="r-type">TYPE A</div>
  <div class="result-title" id="r-title">결과 제목</div>
  <div class="result-ticker" id="r-tickers"></div>

  <div class="result-desc" id="r-desc"></div>

  <div class="result-reason-title">✨ 이 유형이 추천된 이유</div>
  <ul class="reason-list" id="r-reasons"></ul>

  <div class="divider"></div>

  <div class="score-bar-section" id="r-scores"></div>

  <div class="share-row">
    <button class="btn-retry" onclick="retryTest()">🔄 다시 하기</button>
    <button class="btn-share" onclick="shareResult()">🔗 결과 공유</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════
   데이터 설계
   ─────────────────────────────────────
   5가지 성향 타입

   INCOME  : 배당 인컴형   (리얼티인컴·KT&G)
   DOMESTIC: 국내 플랫폼형 (카카오·네이버)

/* ── 상태 ── */
let currentQ = 0;
let scores = { STABLE:0, GROWTH:0, INCOME:0, DOMESTIC:0, HEDGE:0 };
let answers = [];

/* ── 화면 전환 ── */
function show(id) {
  ['screen-intro','screen-question','screen-loading','screen-result']
    .forEach(s => document.getElementById(s).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ── 테스트 시작 ── */
function startTest() {
  currentQ = 0;
  scores = { STABLE:0, GROWTH:0, INCOME:0, DOMESTIC:0, HEDGE:0 };
  answers = [];
  show('screen-question');
  renderQuestion();
}

/* ── 질문 렌더링 ── */
function renderQuestion() {
  const q = questions[currentQ];
  const total = questions.length;
  const pct = Math.round(((currentQ + 1) / total) * 100);

  document.getElementById('q-step').textContent = `${currentQ + 1} / ${total}`;
  document.getElementById('q-pct').textContent = `${pct}%`;
  document.getElementById('progress-fill').style.width = `${pct}%`;
  document.getElementById('q-label').textContent = `Q${currentQ + 1}`;
  document.getElementById('q-emoji').textContent = q.emoji;
  document.getElementById('q-text').textContent = q.text;

  const wrap = document.getElementById('options-wrap');
  wrap.innerHTML = '';
  q.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-icon">${opt.icon}</span><span>${opt.text}</span>`;
    btn.onclick = () => selectOption(idx, opt.scores);
    wrap.appendChild(btn);
  });
}

/* ── 선택지 클릭 ── */
function selectOption(idx, scoreMap) {
  // 선택 표시
  document.querySelectorAll('.option-btn').forEach((b, i) => {
    b.classList.toggle('selected', i === idx);
    b.disabled = true;
  });

  // 점수 누적
  for (const [type, val] of Object.entries(scoreMap)) {
    scores[type] = (scores[type] || 0) + val;
  }
  answers.push(idx);

  // 다음 질문으로
  setTimeout(() => {
    currentQ++;
    if (currentQ < questions.length) {
      renderQuestion();
    } else {
      showLoading();
    }
  }, 420);
}

/* ── 로딩 ── */
const loadingMsgs = [
  '답변 데이터 수집 중... 📊',
  '투자 성향 패턴 분석 중... 🔍',
  '딱 맞는 종목 매칭 중... 💹',
  '결과 리포트 생성 중... ✨',
];

function showLoading() {
  show('screen-loading');
  let i = 0;
  const el = document.getElementById('loading-msg');
  const iv = setInterval(() => {
    el.textContent = loadingMsgs[i % loadingMsgs.length];
    i++;
    if (i >= loadingMsgs.length) {
      clearInterval(iv);
      setTimeout(showResult, 600);
    }
  }, 600);
}

/* ── 결과 계산 ── */
function calcResult() {
  return TYPES.reduce((a, b) => scores[a] >= scores[b] ? a : b);
}

/* ── 결과 렌더링 ── */
function showResult() {
  const type = calcResult();
  const r = results[type];

  document.getElementById('r-emoji').textContent = r.emoji;
  document.getElementById('r-type').textContent = r.type;
  document.getElementById('r-title').textContent = r.title;

  // 티커 칩
  const tickerEl = document.getElementById('r-tickers');
  tickerEl.innerHTML = r.tickers.map(t =>
    `<span class="ticker-chip" style="color:${t.color}; border-color:${t.color}; background:${t.color}18">${t.label}</span>`
  ).join('');

  document.getElementById('r-desc').textContent = r.desc;

  // 추천 이유
  document.getElementById('r-reasons').innerHTML = r.reasons.map(re =>
    `<li class="reason-item">${re}</li>`
  ).join('');

  // 점수 바
  const maxScore = Math.max(...Object.values(scores)) || 1;
  const typeLabels = { STABLE:'안정형', GROWTH:'성장형', INCOME:'인컴형', DOMESTIC:'국내형', HEDGE:'헤지형' };
  const typeColors = { STABLE:'#60a5fa', GROWTH:'#34d399', INCOME:'#a78bfa', DOMESTIC:'#fbbf24', HEDGE:'#f87171' };

  const scoreSection = document.getElementById('r-scores');
  scoreSection.innerHTML = '<div style="font-size:13px; font-weight:700; color:#6b7280; margin-bottom:12px">📊 나의 투자 성향 점수</div>' +
    TYPES.map(t => {
      const pct = Math.round((scores[t] / maxScore) * 100);
      return `
        <div class="score-label">
          <span>${typeLabels[t]}</span>
          <span>${scores[t]}점</span>
        </div>
        <div class="score-bar-bg">
          <div class="score-bar-fill" data-w="${pct}" style="width:0%; background:${typeColors[t]}"></div>
        </div>`;
    }).join('');

  show('screen-result');

  // 바 애니메이션
  requestAnimationFrame(() => {
    document.querySelectorAll('.score-bar-fill').forEach(el => {
      el.style.width = el.dataset.w + '%';
    });
  });
}

/* ── 다시 하기 ── */
function retryTest() {
  show('screen-intro');
}

/* ── 공유 ── */
function shareResult() {
  const type = calcResult();
  const r = results[type];
  const text = `나는 ${r.title.replace(/\n/,' ')} 🎯\n추천 종목: ${r.tickers.map(t=>t.label).join(', ')}\n\n내 주식 투자 성향 테스트 결과!`;

  if (navigator.share) {
    navigator.share({ title: '나는 어떤 주식 투자자?', text }).catch(() => {});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => alert('📋 결과가 클립보드에 복사됐어요!'));
  } else {
    alert(text);
  }
}
